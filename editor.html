<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Игры: Силомер</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px; }
        .section { background: #fafbfc; border: 1px solid #e1e4e8; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .section h2 { margin-top: 0; font-size: 1.2rem; color: #2c3e50; border-left: 4px solid #3498db; padding-left: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: #555; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 1rem; }
        input[type="text"]:focus, select:focus, textarea:focus { outline: none; border-color: #3498db; box-shadow: 0 0 5px rgba(52,152,219,0.3); }
        
        .row { display: flex; gap: 20px; }
        .col { flex: 1; }

        .question-block { background: #fff; border: 1px solid #d1d5da; padding: 20px; border-radius: 8px; margin-bottom: 15px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .question-block h4 { margin: 0 0 15px 0; color: #e67e22; font-size: 1.1rem; }
        .remove-btn { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .remove-btn:hover { background: #c0392b; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .correct-select { width: 100%; padding: 8px; background-color: #f0f8ff; border-color: #3498db; font-weight: bold; }

        .btn-add { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; display: block; margin: 0 auto; font-size: 1rem; transition: background 0.2s; }
        .btn-add:hover { background: #27ae60; }

        .btn-generate { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; transition: transform 0.1s, background 0.2s; }
        .btn-generate:hover { background: #2980b9; }
        .btn-generate:active { transform: scale(0.98); }

        #output-area { margin-top: 30px; display: none; background: #e8f5e9; padding: 20px; border-radius: 8px; border: 1px solid #a5d6a7; }
        textarea#iframe-code { width: 100%; height: 120px; font-family: monospace; padding: 10px; border: 1px solid #a5d6a7; border-radius: 6px; resize: vertical; font-size: 0.9rem; }
        .copy-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .copy-btn:hover { background: #1a252f; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="lbl-title">🛠️ Конструктор Силомера</h1>

    <!-- ПРЕСЕТЫ ЯЗЫКОВ -->
    <div class="section">
        <h2 id="lbl-lang-sec">🌐 Язык интерфейса</h2>
        <div class="form-group">
            <select id="lang-select" onchange="changeLanguage()">
                <option value="ru">🇷🇺 Русский</option>
                <option value="en">🇬🇧 English</option>
                <option value="es">🇪🇸 Español</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="zh">🇨🇳 中文</option>
            </select>
        </div>
    </div>

    <!-- ДИЗАЙН -->
    <div class="section">
        <h2 id="lbl-design-sec">🎨 Дизайн и Шрифты</h2>
        <div class="row">
            <div class="col">
                <label id="lbl-font">Шрифт игры</label>
                <select id="cfg-font">
                    <option value="'Ubuntu', sans-serif">Ubuntu (Современный)</option>
                    <option value="'Montserrat', sans-serif">Montserrat (Строгий)</option>
                    <option value="'Comic Sans MS', cursive">Comic Sans (Веселый)</option>
                    <option value="'Courier New', Courier, monospace">Courier (Ретро)</option>
                </select>
            </div>
            <div class="col">
                <label id="lbl-color">Цвет текста</label>
                <input type="color" id="cfg-color" value="#2c3e50">
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col">
                <label id="lbl-bg">Цвет плашек (фона текста)</label>
                <input type="color" id="cfg-bg" value="#ffffff">
            </div>
            <div class="col">
                <label><span id="lbl-opacity">Прозрачность плашек:</span> <span id="opacity-val">95</span>%</label>
                <input type="range" id="cfg-opacity" min="50" max="100" value="95" oninput="document.getElementById('opacity-val').innerText = this.value">
            </div>
        </div>
    </div>

    <!-- ТЕКСТЫ ИНТЕРФЕЙСА -->
    <div class="section">
        <h2 id="lbl-texts-sec">📝 Игровые тексты</h2>
        <div class="form-group">
            <label id="lbl-start-title">Стартовый экран: Заголовок</label>
            <input type="text" id="t-start-title">
        </div>
        <div class="form-group">
            <label id="lbl-start-desc">Стартовый экран: Описание</label>
            <textarea id="t-start-desc" rows="2"></textarea>
        </div>
        <div class="row">
            <div class="col"><label id="lbl-btn-start">Кнопка СТАРТ</label><input type="text" id="t-btn-start"></div>
            <div class="col"><label id="lbl-btn-restart">Кнопка РЕСТАРТ</label><input type="text" id="t-btn-restart"></div>
        </div>
        <br>
        <div class="row">
            <div class="col"><label id="lbl-prog">Текст: Вопрос N из M</label><input type="text" id="t-progress"></div>
        </div>
    </div>

    <!-- ФИДБЕК УДАРОВ -->
    <div class="section">
        <h2 id="lbl-hit-sec">💥 Тексты реакции на удар</h2>
        <div class="row">
            <div class="col"><label id="lbl-hit-perf">Идеально (>60% точности)</label><input type="text" id="t-hit-perfect"></div>
            <div class="col"><label id="lbl-hit-good">Отлично (<60% точности)</label><input type="text" id="t-hit-good"></div>
        </div>
        <br>
        <div class="row">
            <div class="col"><label id="lbl-hit-wrong">Ошибка</label><input type="text" id="t-hit-wrong"></div>
            <div class="col"><label id="lbl-hit-miss">Промах</label><input type="text" id="t-hit-miss"></div>
            <div class="col"><label id="lbl-combo">Слово: КОМБО</label><input type="text" id="t-combo"></div>
        </div>
    </div>

    <!-- ФИНАЛЬНЫЙ ЭКРАН -->
    <div class="section">
        <h2 id="lbl-fin-sec">🏆 Финальный экран и Статистика</h2>
        <div class="row">
            <div class="col"><label id="lbl-fin-win">Текст Победы</label><input type="text" id="t-fin-win"></div>
            <div class="col"><label id="lbl-stat-row">Приписка "подряд" (напр. 3 подряд)</label><input type="text" id="t-stat-row"></div>
        </div>
        <br>
        <div class="row">
            <div class="col"><label id="lbl-s1">Статистика: Идеально</label><input type="text" id="t-stat-1"></div>
            <div class="col"><label id="lbl-s2">Отлично</label><input type="text" id="t-stat-2"></div>
            <div class="col"><label id="lbl-s3">Ошибки</label><input type="text" id="t-stat-3"></div>
            <div class="col"><label id="lbl-s4">Макс Комбо</label><input type="text" id="t-stat-4"></div>
        </div>
    </div>

    <!-- ВОПРОСЫ -->
    <div class="section">
        <h2 id="lbl-q-sec">❓ Вопросы и ответы</h2>
        <div id="questions-wrapper"></div>
        <button class="btn-add" id="btn-add-q" onclick="addQuestion()">+ ДОБАВИТЬ ВОПРОС</button>
    </div>

    <button class="btn-generate" id="btn-gen" onclick="generateIframe()">СГЕНЕРИРОВАТЬ КОД ДЛЯ GENIALLY 🚀</button>

    <div id="output-area">
        <h2 style="margin-top:0;">Код Iframe (Скопируйте)</h2>
        <textarea id="iframe-code" readonly></textarea>
        <button class="copy-btn" onclick="copyCode()">📋 Скопировать код</button>
    </div>
</div>
