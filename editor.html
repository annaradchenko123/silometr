<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Game Maker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-top: 0; }
        .section { background: #f8f9fa; border: 1px solid #e9ecef; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .section h2 { margin-top: 0; font-size: 1.2rem; color: #34495e; border-bottom: 2px solid #3498db; padding-bottom: 5px; display: inline-block; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        
        .row { display: flex; gap: 20px; }
        .col { flex: 1; }

        .question-block { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; position: relative; }
        .question-block h4 { margin: 0 0 10px 0; color: #e67e22; }
        .remove-btn { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .remove-btn:hover { background: #c0392b; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .correct-select { width: 100%; margin-top: 5px; padding: 5px; }

        .btn-add { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; display: block; margin: 0 auto; }
        .btn-add:hover { background: #27ae60; }

        .btn-generate { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; }
        .btn-generate:hover { background: #2980b9; }

        #output-area { margin-top: 30px; display: none; }
        textarea#iframe-code { width: 100%; height: 150px; font-family: monospace; padding: 10px; border: 2px solid #2ecc71; border-radius: 6px; resize: vertical; }
        .copy-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="ui-title">🛠️ Конструктор Силомера</h1>

    <!-- ПРЕСЕТЫ ЯЗЫКОВ -->
    <div class="section">
        <h2 id="ui-h-lang">🌐 Язык интерфейса</h2>
        <div class="form-group">
            <select id="lang-select" onchange="applyLangPreset()">
                <option value="ru">🇷🇺 Русский</option>
                <option value="en">🇬🇧 English</option>
                <option value="es">🇪🇸 Español</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="zh">🇨🇳 中文</option>
            </select>
        </div>
    </div>

    <!-- ДИЗАЙН -->
    <div class="section">
        <h2 id="ui-h-design">🎨 Дизайн и Шрифты</h2>
        <div class="row">
            <div class="col">
                <label id="ui-l-font">Шрифт</label>
                <select id="font-family">
                    <option value="'Ubuntu', sans-serif">Ubuntu</option>
                    <option value="'Montserrat', sans-serif">Montserrat</option>
                    <option value="'Comic Sans MS', cursive">Comic Sans</option>
                    <option value="'Courier New', Courier, monospace">Courier</option>
                </select>
            </div>
            <div class="col">
                <label id="ui-l-color">Цвет текста</label>
                <input type="color" id="text-color" value="#2c3e50">
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col">
                <label id="ui-l-bg">Цвет плашек</label>
                <input type="color" id="panel-color" value="#ffffff">
            </div>
            <div class="col">
                <label><span id="ui-l-opacity">Прозрачность:</span> <span id="opacity-val">95</span>%</label>
                <input type="range" id="panel-opacity" min="50" max="100" value="95" style="width:100%" oninput="document.getElementById('opacity-val').innerText = this.value">
            </div>
        </div>
    </div>

    <!-- ТЕКСТЫ ИНТЕРФЕЙСА -->
    <div class="section">
        <h2 id="ui-h-texts">📝 Тексты интерфейса</h2>
        <div class="form-group">
            <label id="ui-l-st">Стартовый экран: Заголовок</label>
            <input type="text" id="t-start-title">
        </div>
        <div class="form-group">
            <label id="ui-l-sd">Стартовый экран: Описание</label>
            <textarea id="t-start-desc" rows="2"></textarea>
        </div>
        <div class="row">
            <div class="col"><label id="ui-l-bs">Кнопка СТАРТ</label><input type="text" id="t-btn-start"></div>
            <div class="col"><label id="ui-l-br">Кнопка РЕСТАРТ</label><input type="text" id="t-btn-restart"></div>
        </div>
        <br>
        <div class="row">
            <div class="col"><label id="ui-l-pr">Текст: Вопрос N из M</label><input type="text" id="t-progress"></div>
        </div>
    </div>

    <!-- ФИДБЕК УДАРОВ -->
    <div class="section">
        <h2 id="ui-h-hit">💥 Тексты реакции на удар</h2>
        <div class="row">
            <div class="col"><label id="ui-l-hp">Идеально</label><input type="text" id="t-hit-perfect"></div>
            <div class="col"><label id="ui-l-hg">Отлично</label><input type="text" id="t-hit-good"></div>
        </div>
        <br>
        <div class="row">
            <div class="col"><label id="ui-l-hw">Ошибка</label><input type="text" id="t-hit-wrong"></div>
            <div class="col"><label id="ui-l-hm">Промах</label><input type="text" id="t-hit-miss"></div>
            <div class="col"><label id="ui-l-cmb">Слово: КОМБО</label><input type="text" id="t-combo"></div>
        </div>
    </div>

    <!-- ФИНАЛЬНЫЙ ЭКРАН -->
    <div class="section">
        <h2 id="ui-h-fin">🏆 Финальный экран</h2>
        <div class="row">
            <div class="col"><label id="ui-l-fw">Победа</label><input type="text" id="t-fin-win"></div>
            <div class="col"><label id="ui-l-fl">Поражение</label><input type="text" id="t-fin-lose"></div>
        </div>
        <br>
        <div class="row">
            <div class="col"><label id="ui-l-s1">Идеально</label><input type="text" id="t-stat-1"></div>
            <div class="col"><label id="ui-l-s2">Отлично</label><input type="text" id="t-stat-2"></div>
            <div class="col"><label id="ui-l-s3">Ошибки</label><input type="text" id="t-stat-3"></div>
            <div class="col"><label id="ui-l-s4">Макс Комбо</label><input type="text" id="t-stat-4"></div>
        </div>
        <div class="form-group" style="margin-top:10px;">
            <label id="ui-l-sr">Приписка "подряд"</label>
            <input type="text" id="t-stat-row">
        </div>
    </div>

    <!-- ВОПРОСЫ -->
    <div class="section">
        <h2 id="ui-h-qsec">❓ Вопросы и ответы</h2>
        <div id="questions-container"></div>
        <button class="btn-add" id="ui-btn-add" onclick="addQuestionBlock()">+ ДОБАВИТЬ ВОПРОС</button>
    </div>

    <button class="btn-generate" id="ui-btn-gen" onclick="generateIframe()">Сгенерировать код 🚀</button>

    <div id="output-area">
        <h2>Iframe Code</h2>
        <textarea id="iframe-code" readonly></textarea>
        <button class="copy-btn" onclick="copyCode()">📋 Copy</button>
    </div>
</div>

<div id="game-wrapper">
    <div class="overlay-bg"></div>
    <div id="hit-stop-flash"></div>

<script>
    const GAME_CFG = {{VAR_JSON_CONFIG}};
    document.getElementById('ui-start-title').innerText = GAME_CFG.texts.startTitle; document.getElementById('ui-start-desc').innerText = GAME_CFG.texts.startDesc;
    document.getElementById('start-btn').innerText = GAME_CFG.texts.btnStart; document.getElementById('ui-prog-text').innerText = GAME_CFG.texts.progress;
    document.getElementById('ui-btn-restart').innerText = GAME_CFG.texts.btnRestart; document.getElementById('total-num').innerText = GAME_CFG.questions.length;
    document.getElementById('ui-st-1').innerText = GAME_CFG.texts.stat1; document.getElementById('ui-st-2').innerText = GAME_CFG.texts.stat2;
    document.getElementById('ui-st-3').innerText = GAME_CFG.texts.stat3; document.getElementById('ui-st-4').innerText = GAME_CFG.texts.stat4;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const bgMusic = document.getElementById('bg-music'); bgMusic.volume = 0.2; 
    function playSound(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain(); osc.connect(gainNode); gainNode.connect(audioCtx.destination); const now = audioCtx.currentTime; bgMusic.volume = 0.05;
        if (type === 'hit') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1); gainNode.gain.setValueAtTime(1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); setTimeout(() => { if(ui.finalScreen.style.display !== 'flex') bgMusic.volume = 0.2; }, 300); } 
        else if (type === 'success') { osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.1); osc.frequency.setValueAtTime(659.25, now + 0.2); gainNode.gain.setValueAtTime(0.5, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.5); osc.start(now); osc.stop(now + 0.5); setTimeout(() => { if(ui.finalScreen.style.display !== 'flex') bgMusic.volume = 0.2; }, 1500); } 
        else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(100, now + 0.4); gainNode.gain.setValueAtTime(0.5, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.4); osc.start(now); osc.stop(now + 0.4); setTimeout(() => { if(ui.finalScreen.style.display !== 'flex') bgMusic.volume = 0.2; }, 1000); }
    }
