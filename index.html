<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Силомер</title>
    <!-- Библиотека для салюта -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Мягкий шрифт Ubuntu */
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700;900&display=swap');

        body { 
            font-family: 'Ubuntu', sans-serif; 
            background-color: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            user-select: none;
        }
        
        /* Главный контейнер 16:9 */
        #game-wrapper {
            width: 100%;
            max-width: 1280px; 
            aspect-ratio: 16 / 9; 
            background-image: url('https://i.postimg.cc/HsxzZ6mn/image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .overlay-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }

        /* ЛЕВАЯ ПАНЕЛЬ: Силомер */
        #left-panel {
            width: 35%; 
            height: 100%;
            position: relative;
            z-index: 2;
        }

        /* НОВАЯ КАРТИНКА СИЛОМЕРА */
        #silomer-machine {
            position: absolute;
            width: 100%;
            height: 85%;
            bottom: 5%; 
            background-image: url('https://i.postimg.cc/85fWQqXv/GG-2-unit-2-3-kopia.png');
            background-size: contain;
            background-position: center bottom;
            background-repeat: no-repeat;
        }

        /* Табло счета */
        #score-display {
            position: absolute;
            top: 2%; 
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(17, 17, 17, 0.9);
            color: #ffd700;
            padding: 5px 25px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 2.8rem;
            border: 3px solid #ff7979;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            z-index: 10;
        }
        .score-anim { transform: translate(-50%, 0) scale(1.15) !important; color: #fff !important; }

        /* НАСТРОЙКА ШКАЛЫ (Опущена ниже, чтобы освободить верх) */
        #track {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 30%;      /* Опустили начало шкалы */
            height: 48%;   /* Длина шкалы */
            width: 10px;
            background: rgba(255, 255, 255, 0.05); /* Невидимая направляющая */
            z-index: 5;
        }

        /* Менее агрессивный и уменьшенный ползунок */
        #slider {
            position: absolute;
            width: 50px;       /* Уменьшили ширину */
            left: -20px;       /* Центрируем */
            height: 24px;      /* Уменьшили высоту */
            background: linear-gradient(90deg, #ff7979, #ff9e9e); /* Мягкий коралловый цвет */
            border-radius: 12px;
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(255, 121, 121, 0.6); /* Мягкое свечение */
            z-index: 6;
        }

        /* Менее яркий лазер */
        #slider-pointer {
            position: absolute;
            width: 1000px;
            height: 3px; /* Сделали тоньше */
            background: linear-gradient(90deg, rgba(255, 121, 121, 0.6) 0%, rgba(255, 121, 121, 0) 100%); /* Полупрозрачный, не режет глаз */
            top: 50%;
            left: 100%;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 1;
        }

        /* Кнопка (Картинка) */
        #hammer-btn {
            position: absolute;
            bottom: -8%; 
            left: 50%;
            transform: translateX(-50%);
            width: 160px;  
            height: 140px; 
            background-color: transparent;
            background-image: url('https://i.postimg.cc/Y0LnhnXX/11-(12).png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 10;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        #hammer-btn:active { transform: translate(-50%, 10px) scale(0.95); }
        #hammer-btn:disabled { filter: grayscale(100%); cursor: not-allowed; opacity: 0.8; }

        /* ПРАВАЯ ПАНЕЛЬ */
        #right-panel {
            width: 65%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 30px 60px 40px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        #progress-container { width: 100%; background: rgba(0,0,0,0.5); border-radius: 10px; height: 12px; margin-bottom: 15px; border: 2px solid #555; overflow: hidden; flex-shrink: 0; }
        #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #f1c40f, #f39c12); transition: width 0.3s ease; }
        #progress-text { text-align: right; color: #f1c40f; font-weight: 700; font-size: 1.2rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }

        #question-display {
            background-color: rgba(255, 255, 255, 0.95);
            color: #2c3e50;
            padding: 20px 30px;
            border-radius: 20px;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            border: 4px solid #f39c12;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        /* Контейнер ответов привязан к шкале (от верха до низа) */
        #answers-container {
            position: absolute;
            left: 20px;
            width: calc(100% - 80px);
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Распределяет 3 ответа равномерно */
        }

        .answer-slot {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            border: 3px solid #cbd5e1; /* Мягкая рамка */
            color: #1e293b;
            padding: 20px;
            font-size: 1.6rem;
            font-weight: 700;
            border-radius: 15px;
            text-align: center;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            z-index: 3;
            box-sizing: border-box;
        }

        /* ФИДБЕК */
        #feedback-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        #feedback-text { 
            font-size: 5rem; 
            font-weight: 900; 
            text-align: center; 
            text-transform: uppercase; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            margin-bottom: 15px; 
            letter-spacing: 2px;
        }
        #feedback-points { 
            font-size: 3.5rem; 
            font-weight: 700; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 10px 40px; 
            border-radius: 30px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
        }

        /* Финальный экран */
        #final-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; display: none; text-align: center; backdrop-filter: blur(5px); }
        #final-screen h2 { font-size: 4rem; font-weight: 900; margin: 0; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        #final-score { font-size: 7rem; font-weight: 900; color: #ffd700; margin: 10px 0; text-shadow: 0 5px 20px rgba(243, 156, 18, 0.5); }
        #final-rank { color: #2ecc71; font-size: 3rem; text-transform: uppercase; font-weight: 700; margin-bottom: 40px;}
        .restart-btn { padding: 20px 60px; background-color: #ff7979; color: white; border: none; border-radius: 40px; font-size: 2rem; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 8px 0 #eb4d4b; text-transform: uppercase; }
        .restart-btn:hover { transform: scale(1.05); }
        .restart-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #eb4d4b; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="overlay-bg"></div>

    <div id="left-panel">
        <div id="silomer-machine">
            <div id="score-display">0</div>
            <div id="track">
                <div id="slider"><div id="slider-pointer"></div></div>
            </div>
            <button id="hammer-btn" aria-label="Удар молотком"></button>
        </div>
    </div>

    <div id="right-panel">
        <div id="progress-text">Вопрос <span id="progress-num">1</span> из 12</div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        
        <div id="question-display">Загрузка...</div>
        <div id="answers-container"></div>
    </div>

    <div id="feedback-overlay">
        <div id="feedback-text"></div>
        <div id="feedback-points"></div>
    </div>

    <div id="final-screen">
        <h2>ИГРА ЗАВЕРШЕНА</h2>
        <div id="final-score">1200</div>
        <div id="final-rank">Мастер силы!</div>
        <button class="restart-btn" onclick="initGame()">ИГРАТЬ СНОВА</button>
    </div>
</div>

<script>
    // ЗВУКИ
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'hit') { 
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
            gainNode.gain.setValueAtTime(1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'success') { 
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(554.37, now + 0.1);
            osc.frequency.setValueAtTime(659.25, now + 0.2);
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'error') { 
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.4);
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        }
    }

    // КОНФИГУРАЦИЯ (12 вопросов, 3 варианта, очки по ТЗ)
    const gameConfig = {
        sliderSpeedMultiplier: 1.5,
        points: { perfect: 100, good: 70, wrong: -80, miss: -50 },
        questions: [
            { text: "Какая планета самая большая в Солнечной системе?", options: ["Земля", "Марс", "Юпитер"], correctIndex: 2 },
            { text: "Сколько будет 7 умножить на 8?", options: ["54", "56", "64"], correctIndex: 1 },
            { text: "В каком году человек впервые полетел в космос?", options: ["1957", "1961", "1969"], correctIndex: 1 },
            { text: "Какой океан самый большой на Земле?", options: ["Атлантический", "Индийский", "Тихий"], correctIndex: 2 },
            { text: "Самый твердый минерал в природе?", options: ["Кварц", "Алмаз", "Изумруд"], correctIndex: 1 },
            { text: "Сколько материков на планете Земля?", options: ["4", "5", "6"], correctIndex: 2 },
            { text: "Какая химическая формула у воды?", options: ["CO2", "H2O", "O2"], correctIndex: 1 },
            { text: "Столица Австралии?", options: ["Сидней", "Мельбурн", "Канберра"], correctIndex: 2 },
            { text: "Кто написал произведение «Муму»?", options: ["Пушкин", "Тургенев", "Толстой"], correctIndex: 1 },
            { text: "Самая длинная река в мире?", options: ["Нил", "Амазонка", "Янцзы"], correctIndex: 1 },
            { text: "Какой газ мы вдыхаем для жизни?", options: ["Азот", "Кислород", "Углекислый газ"], correctIndex: 1 },
            { text: "Столица Японии?", options: ["Пекин", "Сеул", "Токио"], correctIndex: 2 }
        ],
        ranks: [
            { minScore: 0, title: "Новичок" },
            { minScore: 500, title: "Эксперт" },
            { minScore: 1000, title: "Мастер силы!" } 
        ]
    };

    let currentQuestionIndex = 0;
    let score = 0;
    let animationFrameId;
    let laserY = 0; 
    let direction = 1; 
    let isPlaying = false;
    let sliderSpeed = 5 * gameConfig.sliderSpeedMultiplier;

    const ui = {
        progNum: document.getElementById('progress-num'),
        progBar: document.getElementById('progress-bar'),
        score: document.getElementById('score-display'),
        question: document.getElementById('question-display'),
        answersBox: document.getElementById('answers-container'),
        track: document.getElementById('track'),
        slider: document.getElementById('slider'),
        btn: document.getElementById('hammer-btn'),
        feedback: document.getElementById('feedback-overlay'),
        fText: document.getElementById('feedback-text'),
        fPoints: document.getElementById('feedback-points'),
        finalScreen: document.getElementById('final-screen'),
        finalScore: document.getElementById('final-score'),
        finalRank: document.getElementById('final-rank')
    };

    // Функция, которая делает высоту 3-х ответов точно такой же, как длина трубы силомера
    function alignAnswersContainer() {
        const trackRect = ui.track.getBoundingClientRect();
        const rightPanelRect = document.getElementById('right-panel').getBoundingClientRect();
        
        ui.answersBox.style.top = (trackRect.top - rightPanelRect.top) + 'px';
        ui.answersBox.style.height = trackRect.height + 'px';
    }
    window.addEventListener('resize', alignAnswersContainer);

    function initGame() {
        currentQuestionIndex = 0;
        score = 0;
        updateScoreDisplay(0);
        ui.finalScreen.style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= gameConfig.questions.length) { endGame(); return; }

        const qData = gameConfig.questions[currentQuestionIndex];
        
        ui.progNum.innerText = currentQuestionIndex + 1;
        ui.progBar.style.width = `${((currentQuestionIndex) / gameConfig.questions.length) * 100}%`;
        ui.question.innerText = qData.text;

        ui.answersBox.innerHTML = '';
        alignAnswersContainer();

        qData.options.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'answer-slot';
            div.innerText = opt;
            div.dataset.index = index;
            ui.answersBox.appendChild(div);
        });

        ui.btn.disabled = false;
        ui.feedback.style.opacity = '0';
        ui.feedback.style.backdropFilter = 'none';
        
        laserY = 0;
        direction = 1;
        ui.slider.style.top = (laserY - (ui.slider.clientHeight / 2)) + 'px';
        
        isPlaying = true;
        animateSlider();
    }

    function animateSlider() {
        if (!isPlaying) return;

        const trackHeight = ui.track.clientHeight;
        laserY += sliderSpeed * direction;

        if (laserY >= trackHeight) { laserY = trackHeight; direction = -1; } 
        else if (laserY <= 0) { laserY = 0; direction = 1; }

        ui.slider.style.top = (laserY - (ui.slider.clientHeight / 2)) + 'px';
        animationFrameId = requestAnimationFrame(animateSlider);
    }

    function handleHit(e) {
        if(e) e.preventDefault();
        if (!isPlaying) return;
        playSound('hit');
        isPlaying = false;
        cancelAnimationFrame(animationFrameId);
        ui.btn.disabled = true;
        checkHit();
    }

    ui.btn.addEventListener('mousedown', handleHit);
    ui.btn.addEventListener('touchstart', handleHit);

    // Проверка попадания: Абсолютные координаты лазера сравниваются с краями карточек
    function checkHit() {
        const trackRect = ui.track.getBoundingClientRect();
        const hitLineAbsoluteY = trackRect.top + laserY; 
        
        const slots = document.querySelectorAll('.answer-slot');
        let hitIndex = -1;
        let accuracy = 0;

        slots.forEach((slot, index) => {
            const rect = slot.getBoundingClientRect();
            // Попадание засчитывается, если лазер находится от верхнего до нижнего края карточки
            if (hitLineAbsoluteY >= rect.top && hitLineAbsoluteY <= rect.bottom) {
                hitIndex = index;
                const slotCenter = rect.top + (rect.height / 2);
                const maxDeviation = rect.height / 2;
                const deviation = Math.abs(slotCenter - hitLineAbsoluteY);
                accuracy = 1 - (deviation / maxDeviation); 
            }
        });

        processResult(hitIndex, accuracy);
    }

    function processResult(hitIndex, accuracy) {
        const correctIndex = gameConfig.questions[currentQuestionIndex].correctIndex;
        let pointsEarned = 0;
        let message = "";
        let color = "";

        const slots = document.querySelectorAll('.answer-slot');
        if (hitIndex !== -1) {
            slots[hitIndex].style.transform = 'scale(1.05)';
        }

        if (hitIndex === -1) {
            pointsEarned = gameConfig.points.miss;
            message = "ПОПРОБУЙ ЕЩЁ!";
            color = "#bdc3c7"; 
            playSound('error');
        } else if (hitIndex === correctIndex) {
            slots[hitIndex].style.borderColor = "#2ecc71"; 
            slots[hitIndex].style.backgroundColor = "#e8f8f5";
            playSound('success');
            fireConfetti(); 

            if (accuracy > 0.6) { 
                pointsEarned = gameConfig.points.perfect;
                message = "ИДЕАЛЬНО!";
                color = "#2ecc71";
            } else { 
                pointsEarned = gameConfig.points.good;
                message = "ОТЛИЧНО!";
                color = "#f1c40f";
            }
        } else {
            slots[hitIndex].style.borderColor = "#e74c3c"; 
            slots[hitIndex].style.backgroundColor = "#fdedec";
            pointsEarned = gameConfig.points.wrong;
            message = "ПОЧТИ!";
            color = "#e74c3c";
            playSound('error'); 
        }

        updateScoreDisplay(pointsEarned);
        showFeedback(message, pointsEarned, color);

        setTimeout(() => {
            currentQuestionIndex++;
            loadQuestion();
        }, 2000); 
    }

    function updateScoreDisplay(points) {
        score += points;
        if(score < 0) score = 0; 
        ui.score.innerText = score;
        if(points !== 0) {
            ui.score.classList.add('score-anim');
            setTimeout(() => ui.score.classList.remove('score-anim'), 300);
        }
    }

    function showFeedback(msg, points, color) {
        ui.fText.innerText = msg;
        ui.fText.style.color = color;
        ui.fPoints.innerText = points > 0 ? `+${points}` : points;
        ui.fPoints.style.color = color;
        
        ui.feedback.style.opacity = '1';
        ui.feedback.style.backdropFilter = 'blur(3px)';
    }

    function fireConfetti() {
        confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 }, colors: ['#ff7979', '#f1c40f', '#2ecc71', '#3498db'] });
    }

    function endGame() {
        ui.progBar.style.width = '100%';
        ui.finalScreen.style.display = 'flex';
        ui.finalScore.innerText = score;
        
        let rankStr = gameConfig.ranks[0].title;
        for (let i = gameConfig.ranks.length - 1; i >= 0; i--) {
            if (score >= gameConfig.ranks[i].minScore) {
                rankStr = gameConfig.ranks[i].title;
                break;
            }
        }
        ui.finalRank.innerText = rankStr;
        fireConfetti();
        setTimeout(fireConfetti, 500);
    }

    initGame();
</script>
</body>
</html>
