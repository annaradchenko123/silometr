<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Силомер</title>
    <!-- Подключаем библиотеку для салюта/хлопушки -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Ubuntu:wght@400;700&display=swap');

        body { 
            font-family: 'Ubuntu', sans-serif; 
            background-color: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            user-select: none;
        }
        
        /* Главный контейнер 16:9 с фоном цирка */
        #game-wrapper {
            width: 100%;
            max-width: 1280px; 
            aspect-ratio: 16 / 9; 
            background-image: url('https://i.postimg.cc/HsxzZ6mn/image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* Затенение фона для контраста */
        .overlay-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 100%);
            z-index: 1;
        }

        /* ЛЕВАЯ ПАНЕЛЬ: Автомат */
        #left-panel {
            width: 35%; 
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 10px 50px 10px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        /* Табло счета */
        #score-display {
            background-color: #111;
            color: #ffd700;
            padding: 15px 30px;
            border-radius: 10px;
            font-family: 'Russo One', sans-serif;
            font-size: 3.5rem;
            border: 5px solid #ff4757;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.8), inset 0 0 10px #000;
            text-shadow: 0 0 10px #ffd700;
            transition: transform 0.2s;
        }
        .score-anim { transform: scale(1.2); color: #fff !important; }

        /* Вертикальная шкала */
        #track {
            flex-grow: 1;
            width: 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 30px 0;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Ограничитель (бегунок) */
        #slider {
            position: absolute;
            width: 70px;
            left: -27px;
            height: 34px;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            border-radius: 17px;
            border: 3px solid white;
            box-shadow: 0 0 25px #ff4757;
            z-index: 5;
        }

        /* Лазерный луч вправо */
        #slider-pointer {
            position: absolute;
            width: 1000px;
            height: 4px;
            background: linear-gradient(90deg, rgba(255, 71, 87, 1) 0%, rgba(255, 71, 87, 0) 100%);
            top: 50%;
            left: 100%;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 0 10px #ff4757;
        }

        /* Красная кнопка (Молоток) */
        #hammer-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff4757 0%, #c0392b 100%);
            border: 8px solid #f1c40f;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 12px 0 #8e44ad, 0 20px 25px rgba(0,0,0,0.8);
            transition: all 0.1s;
            flex-shrink: 0;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #hammer-btn:active { 
            transform: translateY(12px); 
            box-shadow: 0 0 0 #8e44ad, 0 5px 10px rgba(0,0,0,0.8); 
            background: radial-gradient(circle, #ff6b81 0%, #e74c3c 100%);
        }
        #hammer-btn:disabled { filter: grayscale(80%); cursor: not-allowed; }

        /* ПРАВАЯ ПАНЕЛЬ: Вопросы и ответы */
        #right-panel {
            width: 65%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px 60px 40px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        /* Прогресс-бар (12 делений) */
        #progress-container {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            height: 15px;
            margin-bottom: 20px;
            border: 2px solid #555;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f1c40f, #f39c12);
            transition: width 0.3s ease;
        }
        #progress-text { text-align: right; color: #f1c40f; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }

        /* Дисплей вопроса */
        #question-display {
            background-color: rgba(255, 255, 255, 0.95);
            color: #2c3e50;
            padding: 25px 30px;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            border: 6px solid #f39c12;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            min-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Шкала ответов */
        #answers-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            position: relative;
        }

        .answer-slot {
            background-color: rgba(255, 255, 255, 0.9);
            border: 4px solid #34495e;
            color: #2c3e50;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: 700;
            border-radius: 15px;
            text-align: center;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            position: relative;
            z-index: 3;
        }

        /* Фидбек (Отлично/Промах) */
        #feedback-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        #feedback-text { font-family: 'Russo One', sans-serif; font-size: 6rem; text-align: center; text-transform: uppercase; text-shadow: 0 0 20px #000, 4px 4px 0 #000; margin-bottom: 10px; }
        #feedback-points { font-family: 'Russo One', sans-serif; font-size: 4rem; background: rgba(0,0,0,0.8); padding: 10px 40px; border-radius: 20px; border: 4px solid currentColor; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Финальный экран */
        #final-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; display: none; text-align: center; }
        #final-screen h2 { font-family: 'Russo One', sans-serif; font-size: 5rem; margin: 0; color: #fff; text-transform: uppercase; text-shadow: 0 0 20px #e94560; }
        #final-score { font-family: 'Russo One', sans-serif; font-size: 8rem; color: #ffd700; margin: 20px 0; text-shadow: 0 0 30px #f39c12; }
        #final-rank { color: #2ecc71; font-size: 3.5rem; text-transform: uppercase; font-weight: bold; margin-bottom: 40px;}
        .restart-btn { padding: 20px 60px; background-color: #e94560; color: white; border: 6px solid #fff; border-radius: 30px; font-family: 'Russo One', sans-serif; font-size: 2.5rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 0 #c0392b; text-transform: uppercase; }
        .restart-btn:hover { transform: scale(1.05); }
        .restart-btn:active { transform: translateY(10px); box-shadow: 0 0 0 #c0392b; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="overlay-bg"></div>

    <!-- Левая панель: Автомат-силомер -->
    <div id="left-panel">
        <div id="score-display">0</div>
        <div id="track">
            <div id="slider"><div id="slider-pointer"></div></div>
        </div>
        <button id="hammer-btn">УДАР!</button>
    </div>

    <!-- Правая панель: Вопросы -->
    <div id="right-panel">
        <div id="progress-text">Вопрос: <span id="progress-num">1</span>/12</div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        
        <div id="question-display">Загрузка...</div>
        <div id="answers-container"></div>
    </div>

    <!-- Экран фидбека (поверх всего) -->
    <div id="feedback-overlay">
        <div id="feedback-text"></div>
        <div id="feedback-points"></div>
    </div>

    <!-- Финальный экран -->
    <div id="final-screen">
        <h2>ИГРА ЗАВЕРШЕНА</h2>
        <div id="final-score">1200</div>
        <div id="final-rank">Мастер силы!</div>
        <button class="restart-btn" onclick="initGame()">ИГРАТЬ СНОВА</button>
    </div>
</div>

<script>
    /* =========================================
       ГЕНЕРАТОР ЗВУКОВ (Web Audio API)
       Без внешних файлов - работает всегда!
       ========================================= */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        
        if (type === 'hit') { // Звук удара молотка
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
            gainNode.gain.setValueAtTime(1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } 
        else if (type === 'success') { // Звук успеха (Триумф)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(554.37, now + 0.1); // C#
            osc.frequency.setValueAtTime(659.25, now + 0.2); // E
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        } 
        else if (type === 'error') { // Звук разочарования (Гудок)
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.4);
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        }
    }

    /* =========================================
       КОНФИГУРАЦИЯ ИГРЫ (По ТЗ)
       ========================================= */
    const gameConfig = {
        sliderSpeedMultiplier: 1.5, // Скорость бегунка
        points: { perfect: 100, good: 70, wrong: -80, miss: -50 }, // Очки
        // Ровно 12 вопросов с 3-4 вариантами
        questions: [
            { text: "Какая планета самая большая в Солнечной системе?", options: ["Земля", "Марс", "Юпитер", "Сатурн"], correctIndex: 2 },
            { text: "Сколько будет 7 умножить на 8?", options: ["54", "56", "64", "48"], correctIndex: 1 },
            { text: "В каком году человек впервые полетел в космос?", options: ["1957", "1961", "1969", "1975"], correctIndex: 1 },
            { text: "Какой океан самый большой на Земле?", options: ["Атлантический", "Индийский", "Тихий", "Северный Ледовитый"], correctIndex: 2 },
            { text: "Самый твердый минерал в природе?", options: ["Кварц", "Алмаз", "Изумруд", "Рубин"], correctIndex: 1 },
            { text: "Сколько материков на планете Земля?", options: ["4", "5", "6", "7"], correctIndex: 2 },
            { text: "Какая химическая формула у воды?", options: ["CO2", "H2O", "O2", "NaCl"], correctIndex: 1 },
            { text: "Столица Австралии?", options: ["Сидней", "Мельбурн", "Канберра"], correctIndex: 2 },
            { text: "Кто написал произведение «Муму»?", options: ["Пушкин", "Тургенев", "Толстой", "Чехов"], correctIndex: 1 },
            { text: "Самая длинная река в мире?", options: ["Нил", "Амазонка", "Янцзы", "Миссисипи"], correctIndex: 1 },
            { text: "Какой газ мы вдыхаем для жизни?", options: ["Азот", "Кислород", "Углекислый газ", "Гелий"], correctIndex: 1 },
            { text: "Столица Японии?", options: ["Пекин", "Сеул", "Токио", "Бангкок"], correctIndex: 2 }
        ],
        ranks: [
            { minScore: 0, title: "Новичок" },
            { minScore: 500, title: "Эксперт" },
            { minScore: 1000, title: "Мастер силы!" } // Максимум 1200
        ]
    };

    /* =========================================
       ИГРОВОЙ ДВИЖОК
       ========================================= */
    let currentQuestionIndex = 0;
    let score = 0;
    let animationFrameId;
    let sliderY = 0;
    let direction = 1; 
    let isPlaying = false;
    let sliderSpeed = 5 * gameConfig.sliderSpeedMultiplier;

    const ui = {
        progNum: document.getElementById('progress-num'),
        progBar: document.getElementById('progress-bar'),
        score: document.getElementById('score-display'),
        question: document.getElementById('question-display'),
        answersBox: document.getElementById('answers-container'),
        track: document.getElementById('track'),
        slider: document.getElementById('slider'),
        btn: document.getElementById('hammer-btn'),
        feedback: document.getElementById('feedback-overlay'),
        fText: document.getElementById('feedback-text'),
        fPoints: document.getElementById('feedback-points'),
        finalScreen: document.getElementById('final-screen'),
        finalScore: document.getElementById('final-score'),
        finalRank: document.getElementById('final-rank')
    };

    function initGame() {
        currentQuestionIndex = 0;
        score = 0;
        updateScoreDisplay(0);
        ui.finalScreen.style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= gameConfig.questions.length) {
            endGame();
            return;
        }

        const qData = gameConfig.questions[currentQuestionIndex];
        
        // Обновление прогресса
        ui.progNum.innerText = currentQuestionIndex + 1;
        ui.progBar.style.width = `${((currentQuestionIndex) / gameConfig.questions.length) * 100}%`;
        
        ui.question.innerText = qData.text;

        // Генерация ответов
        ui.answersBox.innerHTML = '';
        qData.options.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'answer-slot';
            div.innerText = opt;
            div.dataset.index = index;
            ui.answersBox.appendChild(div);
        });

        sliderY = 0;
        direction = 1;
        ui.btn.disabled = false;
        ui.feedback.style.opacity = '0';
        ui.feedback.style.backdropFilter = 'none';
        
        isPlaying = true;
        animateSlider();
    }

    function animateSlider() {
        if (!isPlaying) return;

        const maxH = ui.track.clientHeight - ui.slider.clientHeight;
        sliderY += sliderSpeed * direction;

        if (sliderY >= maxH) { sliderY = maxH; direction = -1; } 
        else if (sliderY <= 0) { sliderY = 0; direction = 1; }

        ui.slider.style.top = `${sliderY}px`;
        animationFrameId = requestAnimationFrame(animateSlider);
    }

    ui.btn.addEventListener('mousedown', () => {
        if (!isPlaying) return;
        playSound('hit'); // Звук удара
        isPlaying = false;
        cancelAnimationFrame(animationFrameId);
        ui.btn.disabled = true;
        checkHit();
    });

    // Поддержка касаний для мобильных устройств
    ui.btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!isPlaying) return;
        playSound('hit');
        isPlaying = false;
        cancelAnimationFrame(animationFrameId);
        ui.btn.disabled = true;
        checkHit();
    });

    function checkHit() {
        const sliderRect = ui.slider.getBoundingClientRect();
        const hitLineY = sliderRect.top + (sliderRect.height / 2); 
        const slots = document.querySelectorAll('.answer-slot');
        let hitIndex = -1;
        let accuracy = 0;

        slots.forEach((slot, index) => {
            const rect = slot.getBoundingClientRect();
            if (hitLineY >= rect.top && hitLineY <= rect.bottom) {
                hitIndex = index;
                const slotCenter = rect.top + (rect.height / 2);
                const maxDeviation = rect.height / 2;
                const deviation = Math.abs(slotCenter - hitLineY);
                accuracy = 1 - (deviation / maxDeviation); 
            }
        });

        processResult(hitIndex, accuracy);
    }

    function processResult(hitIndex, accuracy) {
        const correctIndex = gameConfig.questions[currentQuestionIndex].correctIndex;
        let pointsEarned = 0;
        let message = "";
        let color = "";

        const slots = document.querySelectorAll('.answer-slot');
        if (hitIndex !== -1) {
            slots[hitIndex].style.transform = 'scale(1.05)';
        }

        if (hitIndex === -1) {
            // Промах по времени/шкале
            pointsEarned = gameConfig.points.miss;
            message = "ПОПРОБУЙ ЕЩЁ!";
            color = "#bdc3c7"; 
            playSound('error');
        } else if (hitIndex === correctIndex) {
            // Правильно
            slots[hitIndex].style.borderColor = "#2ecc71"; 
            slots[hitIndex].style.backgroundColor = "#e8f8f5";
            playSound('success');
            fireConfetti(); // Анимация салюта

            if (accuracy > 0.6) { 
                pointsEarned = gameConfig.points.perfect;
                message = "ИДЕАЛЬНО!";
                color = "#2ecc71";
            } else { 
                pointsEarned = gameConfig.points.good;
                message = "ОТЛИЧНО!";
                color = "#f1c40f";
            }
        } else {
            // Неправильно
            slots[hitIndex].style.borderColor = "#e74c3c"; 
            slots[hitIndex].style.backgroundColor = "#fdedec";
            pointsEarned = gameConfig.points.wrong;
            message = "ПОЧТИ!";
            color = "#e74c3c";
            playSound('error');
        }

        updateScoreDisplay(pointsEarned);
        showFeedback(message, pointsEarned, color);

        // Переход к следующему вопросу
        setTimeout(() => {
            currentQuestionIndex++;
            loadQuestion();
        }, 2000); 
    }

    function updateScoreDisplay(points) {
        score += points;
        if(score < 0) score = 0; // Не уходим в минус
        ui.score.innerText = score;
        
        // Анимация табло
        if(points !== 0) {
            ui.score.classList.add('score-anim');
            setTimeout(() => ui.score.classList.remove('score-anim'), 300);
        }
    }

    function showFeedback(msg, points, color) {
        ui.fText.innerText = msg;
        ui.fText.style.color = color;
        ui.fPoints.innerText = points > 0 ? `+${points}` : points;
        ui.fPoints.style.color = color;
        ui.fPoints.style.borderColor = color;
        
        ui.feedback.style.opacity = '1';
        ui.feedback.style.backdropFilter = 'blur(4px)';
    }

    function fireConfetti() {
        // Запуск красивого конфетти (салюта) из-за автомата
        confetti({
            particleCount: 150,
            spread: 90,
            origin: { y: 0.6 },
            colors: ['#ff4757', '#f1c40f', '#2ecc71', '#3498db']
        });
    }

    function endGame() {
        ui.progBar.style.width = '100%';
        ui.finalScreen.style.display = 'flex';
        ui.finalScore.innerText = score;
        
        let rankStr = gameConfig.ranks[0].title;
        for (let i = gameConfig.ranks.length - 1; i >= 0; i--) {
            if (score >= gameConfig.ranks[i].minScore) {
                rankStr = gameConfig.ranks[i].title;
                break;
            }
        }
        ui.finalRank.innerText = rankStr;
        fireConfetti();
        setTimeout(fireConfetti, 500);
    }

    // Запуск при старте
    initGame();
</script>
</body>
</html>
